name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: markdown-wysiwyg-typography/package-lock.json
      - run: npm ci
        working-directory: markdown-wysiwyg-typography
      - run: npm run lint
        working-directory: markdown-wysiwyg-typography
      - run: npm run typecheck
        working-directory: markdown-wysiwyg-typography
      - run: npm test
        working-directory: markdown-wysiwyg-typography
      - run: npm run build
        working-directory: markdown-wysiwyg-typography
